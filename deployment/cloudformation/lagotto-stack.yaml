AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Lagotto capacity watcher - DynamoDB, SNS, Lambda, EventBridge'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name for resource tagging

  LambdaCodeBucket:
    Type: String
    Default: ''
    Description: S3 bucket containing Lambda code (leave empty to skip Lambda deployment)

  LambdaCodeKey:
    Type: String
    Default: ''
    Description: S3 key for Lambda zip file

  # DynamoDB tables are owned by the CLI, not this stack (#59). The CLI
  # auto-creates them on first `lagotto watch`/`launch` (#12) and `lagotto deploy`
  # ensures they exist before deploying this stack, so the stack only *references*
  # them by name (env vars + IAM). This reconciles #12 and #48 — the natural
  # watch-then-deploy flow no longer collides on AlreadyExists. The names are
  # parameters so a non-default table set (--watches-table/--history-table) still
  # wires the poller correctly.
  WatchesTableName:
    Type: String
    Default: lagotto-watches
    Description: Name of the (CLI-owned) watches DynamoDB table
  HistoryTableName:
    Type: String
    Default: lagotto-match-history
    Description: Name of the (CLI-owned) match-history DynamoDB table
  ScheduledTableName:
    Type: String
    Default: lagotto-scheduled-launches
    Description: Name of the (CLI-owned) scheduled-launches DynamoDB table

Conditions:
  DeployLambda: !Not [!Equals [!Ref LambdaCodeBucket, '']]

Resources:
  # SNS Topic

  # trivy:ignore:AVD-AWS-0136 -- lagotto uses AWS-managed SNS key (alias/aws/sns); CMK not required for this tool
  LagottoCapacityAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: lagotto-capacity-alerts
      DisplayName: Lagotto Capacity Alerts
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: lagotto
        - Key: Component
          Value: alerts

  # Lambda Function (conditional)

  CapacityPollerFunction:
    Type: AWS::Serverless::Function
    Condition: DeployLambda
    Properties:
      FunctionName: lagotto-capacity-poller
      Runtime: provided.al2023
      Architectures:
        - arm64
      Handler: bootstrap
      Timeout: 900
      MemorySize: 512
      CodeUri:
        Bucket: !Ref LambdaCodeBucket
        Key: !Ref LambdaCodeKey
      Environment:
        Variables:
          WATCHES_TABLE: !Ref WatchesTableName
          HISTORY_TABLE: !Ref HistoryTableName
          SCHEDULED_TABLE: !Ref ScheduledTableName
          SNS_TOPIC_ARN: !Ref LagottoCapacityAlertsTopic
          SCHEDULE_NAME: lagotto-capacity-poller
      Policies:
        # The tables are CLI-owned (#59), so scope CRUD by name rather than !Ref a
        # stack-managed resource. The scheduled-launches table (#49) is included —
        # the poller's handleScheduledLaunch / HasPendingScheduledLaunches read and
        # write it, and its IAM was missing before (silent AccessDenied).
        - DynamoDBCrudPolicy:
            TableName: !Ref WatchesTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref HistoryTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ScheduledTableName
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: !Ref LagottoCapacityAlertsTopic
        - Statement:
            # Capacity discovery (truffle) + the read APIs spawn's launcher needs
            # to resolve an AMI, VPC/subnet, security group, and key pair.
            - Effect: Allow
              Action:
                - ec2:DescribeInstanceTypes
                - ec2:DescribeInstanceTypeOfferings
                - ec2:DescribeSpotPriceHistory
                - ec2:DescribeRegions
                - ec2:DescribeImages
                - ec2:DescribeVpcs
                - ec2:DescribeSubnets
                - ec2:DescribeSecurityGroups
                - ec2:DescribeKeyPairs
                - ec2:DescribeInstances
                - ssm:GetParameter
                - ssm:GetParameters
              Resource: '*'
            - Effect: Allow
              Action:
                - scheduler:UpdateSchedule
                - scheduler:GetSchedule
              Resource: !Sub 'arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/lagotto-capacity-poller'
        # An --action spawn watch launches via spawn's headless launcher, which
        # runs RunInstances, tags the instance, and (re)uses the spored IAM
        # instance profile. Without these the hosted poller can only NOTIFY, never
        # spawn — the gap that made hosted --action spawn silently a no-op.
        - Statement:
            - Effect: Allow
              Action:
                - ec2:RunInstances
                - ec2:CreateTags
                - ec2:CreateSecurityGroup
                - ec2:AuthorizeSecurityGroupIngress
              Resource: '*'
            # spored IAM instance profile + role setup (launcher.SetupSporedIAMRole
            # / CreateOrGetInstanceProfile). Scoped to the spored* name prefix.
            - Effect: Allow
              Action:
                - iam:GetRole
                - iam:CreateRole
                - iam:PutRolePolicy
                - iam:AttachRolePolicy
                - iam:GetInstanceProfile
                - iam:CreateInstanceProfile
                - iam:AddRoleToInstanceProfile
              Resource:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:role/spored*'
                - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/spored*'
            # PassRole is required for RunInstances to attach the spored instance
            # profile to the launched instance; scoped to the spored role + the EC2
            # service so it can't be used to pass arbitrary roles elsewhere.
            - Effect: Allow
              Action: iam:PassRole
              Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/spored*'
              Condition:
                StringEquals:
                  iam:PassedToService: ec2.amazonaws.com
      Tags:
        Environment: !Ref Environment
        Application: lagotto
        Component: capacity-poller

  # EventBridge Schedule — starts DISABLED; CLI enables on first watch

  CapacityPollerSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: DeployLambda
    Properties:
      Name: lagotto-capacity-poller
      Description: Polls for EC2 capacity matching active lagotto watches
      ScheduleExpression: rate(5 minutes)
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt CapacityPollerFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn
      State: DISABLED

  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Condition: DeployLambda
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt CapacityPollerFunction.Arn

Outputs:
  WatchesTableName:
    Description: Name of the (CLI-owned) watches table the poller is wired to
    Value: !Ref WatchesTableName
    Export:
      Name: !Sub '${AWS::StackName}-watches-table'

  MatchHistoryTableName:
    Description: Name of the (CLI-owned) match history table the poller is wired to
    Value: !Ref HistoryTableName
    Export:
      Name: !Sub '${AWS::StackName}-match-history-table'

  ScheduledTableName:
    Description: Name of the (CLI-owned) scheduled-launches table the poller is wired to
    Value: !Ref ScheduledTableName
    Export:
      Name: !Sub '${AWS::StackName}-scheduled-table'

  CapacityAlertsTopicArn:
    Description: ARN of the capacity alerts SNS topic
    Value: !Ref LagottoCapacityAlertsTopic
    Export:
      Name: !Sub '${AWS::StackName}-capacity-alerts-topic'

  CapacityPollerFunctionArn:
    Condition: DeployLambda
    Description: ARN of the capacity poller Lambda
    Value: !GetAtt CapacityPollerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-capacity-poller-function'

  SchedulerInvokeRoleArn:
    Condition: DeployLambda
    Description: Role EventBridge Scheduler assumes to invoke the poller (reused by per-launch scheduled launches, #49)
    Value: !GetAtt SchedulerInvokeRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-scheduler-invoke-role'
