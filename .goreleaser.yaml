# GoReleaser configuration for spore-host/lagotto
version: 2

# Build the capacity-poller Lambda zip and attach it to the release (#29). The
# Lambda is a SEPARATE go module (lambda/capacity-poller), so GoReleaser's own
# `builds:` (which builds the root module) can't produce it — hence a before-hook
# that mirrors lambda/capacity-poller/Makefile's build exactly. The zip is then
# attached via `release.extra_files` below, making it end-user-pullable from the
# GitHub Release (no infra-account S3 bucket required).
before:
  hooks:
    - sh -c "cd lambda/capacity-poller && GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o bootstrap main.go && zip -j capacity-poller_lambda_linux_arm64.zip bootstrap"

builds:
  - id: lagotto
    main: .
    binary: lagotto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/spore-host/lagotto/cmd.Version={{.Version}}
      - -X github.com/spore-host/lagotto/cmd.GitCommit={{.Commit}}
      - -X github.com/spore-host/lagotto/cmd.BuildDate={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: lagotto-archive
    name_template: 'lagotto_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

# Publisher-authenticate the release with keyless cosign (Sigstore). We sign the
# checksums.txt — it lists the SHA-256 of every archive/package, so one signature
# transitively authenticates all artifacts (verify the checksum's signature, then
# each file against checksums.txt). Keyless uses the release workflow's GitHub OIDC
# identity via Fulcio/Rekor — no long-lived key to manage or leak.
#
# cosign 3.x emits the modern Sigstore bundle (`--bundle`, bundling signature +
# Fulcio cert + Rekor entry); the old --output-signature/--output-certificate are
# gone. Publishes checksums.txt.bundle. Requires `id-token: write` + cosign on PATH.
# Verify with `cosign verify-blob --bundle` (see docs: "Verify a download").
signs:
  - cmd: cosign
    signature: '${artifact}.bundle'
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - package_name: lagotto
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/lagotto/copyright
        type: doc
    rpm:
      summary: "Watch for EC2 instance capacity across regions"

brews:
  - name: lagotto
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/lagotto
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    dependencies:
      - name: spore-host/tap/truffle
        type: runtime
    test: |
      system "#{bin}/lagotto", "version"
    install: |
      bin.install "lagotto"

scoops:
  - name: lagotto
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/lagotto
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    depends:
      - spore-host/truffle

release:
  github:
    owner: spore-host
    name: lagotto
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{.Version}}"
  # Attach the capacity-poller Lambda zip (built by the before-hook) so it's an
  # end-user-pullable release asset (#29). `lagotto deploy` (#48) will download
  # this and upload it to a bucket in the user's own account for the stack.
  extra_files:
    - glob: ./lambda/capacity-poller/capacity-poller_lambda_linux_arm64.zip
